# Déploie workers/rpc-cors-proxy sur Cloudflare et définit VITE_RAYLS_RPC_HTTP_URL.
#
# Prérequis (une seule fois) :
#   1) Cloudflare → Workers et Pages → **Modifier** le sous-domaine workers.dev (sinon wrangler échoue en CI).
#   2) Secrets GitHub : CLOUDFLARE_API_TOKEN (Workers Edit), CLOUDFLARE_ACCOUNT_ID
#
# Puis : Actions → « Deploy RPC CORS proxy » → Run workflow → Pages se relance ou manuel.
name: Deploy RPC CORS proxy

on:
  workflow_dispatch:

# Le GITHUB_TOKEN doit pouvoir créer/mettre à jour les variables du dépôt :
# Settings → Actions → General → Workflow permissions → **Read and write**.
permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-rpc-proxy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier les secrets Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Secret **CLOUDFLARE_API_TOKEN** manquant (API Token avec droit Workers)."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Secret **CLOUDFLARE_ACCOUNT_ID** manquant (Cloudflare Dashboard → compte → Account ID)."
            exit 1
          fi

      - name: Vérifier le sous-domaine workers.dev (avant wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          OK=$(echo "$RESP" | jq -r '.success // false')
          SUB=$(echo "$RESP" | jq -r '.result.subdomain // empty')
          if [ "$OK" != "true" ] || [ -z "$SUB" ]; then
            echo "::error::Le compte Cloudflare n’a pas encore de sous-domaine **\*.workers.dev** (obligatoire pour publier un Worker depuis GitHub Actions)."
            echo "::error::**À faire une fois dans le navigateur :** Cloudflare Dashboard → **Workers et Pages** → à côté de « Your subdomain » / « Votre sous-domaine », cliquez **Change** / **Modifier** et enregistrez un sous-domaine (écran d’onboarding si c’est la première fois)."
            echo "::error::Lien direct (remplacez ACCOUNT_ID dans l’URL barre d’adresse si besoin) : https://dash.cloudflare.com → menu **Workers & Pages**."
            echo "Réponse API subdomain : $RESP"
            exit 1
          fi
          echo "workers.dev OK : *.$SUB.workers.dev"

      - name: Déployer le Worker (wrangler)
        working-directory: workers/rpc-cors-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 deploy

      - name: URL workers.dev et variable RPC mainnet
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NAME=$(grep -E '^name[[:space:]]*=' workers/rpc-cors-proxy/wrangler.toml | head -1 | sed -E 's/^name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          RESP=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          SUB=$(echo "$RESP" | jq -r '.result.subdomain // empty')
          if [ -z "$SUB" ]; then
            echo "::error::API workers/subdomain : pas de sous-domaine (réponse : $RESP). Activez workers.dev pour le compte."
            exit 1
          fi
          WORKER_URL="https://${NAME}.${SUB}.workers.dev"
          echo "### Proxy RPC mainnet (Cloudflare Worker)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL** : \`$WORKER_URL\`" >> "$GITHUB_STEP_SUMMARY"

          upsert_repo_var() {
            local var_name="$1" var_value="$2"
            local code body
            body=$(jq -n --arg n "$var_name" --arg v "$var_value" '{name:$n,value:$v}')
            code=$(curl -sS -o /tmp/gh_var_body.txt -w "%{http_code}" \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables/${var_name}" \
              -d "$body") || true
            if [ "$code" = "204" ]; then
              echo "Variable mise à jour : $var_name"
              return 0
            fi
            if [ "$code" != "404" ]; then
              echo "::error::GitHub API variable **$var_name** : HTTP $code"
              cat /tmp/gh_var_body.txt || true
              echo ""
              echo "::error::Dépôt **Settings → Actions → General → Workflow permissions** → **Read and write permissions**, puis relancez ce workflow."
              exit 1
            fi
            code=$(curl -sS -o /tmp/gh_var_body.txt -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
              -d "$body") || true
            if [ "$code" = "201" ]; then
              echo "Variable créée : $var_name"
              return 0
            fi
            echo "::error::Création variable **$var_name** : HTTP $code"
            cat /tmp/gh_var_body.txt || true
            echo ""
            echo "::error::Dépôt **Settings → Actions → General → Workflow permissions** → **Read and write permissions**, puis relancez ce workflow."
            exit 1
          }

          upsert_repo_var VITE_RAYLS_RPC_HTTP_URL "$WORKER_URL"

          echo "- Variable **VITE_RAYLS_RPC_HTTP_URL** mise à jour." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Le workflow **Pages** se relance automatiquement si configuré, sinon relancez-le ou poussez sur \`main\`." >> "$GITHUB_STEP_SUMMARY"
