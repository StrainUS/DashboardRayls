# Déploie workers/coingecko-cors-proxy et définit VITE_COINGECKO_API_ROOT.
#
# Secret CoinGecko : COINGECKO_DEMO_API_KEY ou (fallback) VITE_COINGECKO_DEMO_API_KEY
name: Deploy CoinGecko CORS proxy

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-coingecko-proxy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Vérifier Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Secrets **CLOUDFLARE_API_TOKEN** et **CLOUDFLARE_ACCOUNT_ID** requis (voir proxy RPC)."
            exit 1
          fi

      - name: Vérifier sous-domaine workers.dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          OK=$(echo "$RESP" | jq -r '.success // false')
          SUB=$(echo "$RESP" | jq -r '.result.subdomain // empty')
          if [ "$OK" != "true" ] || [ -z "$SUB" ]; then
            echo "::error::Sous-domaine **workers.dev** non configuré sur le compte Cloudflare."
            exit 1
          fi
          echo "workers.dev OK : *.$SUB.workers.dev"

      - name: Vérifier une clé CoinGecko
        env:
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          VITE_COINGECKO_DEMO_API_KEY: ${{ secrets.VITE_COINGECKO_DEMO_API_KEY }}
          COINGECKO_PRO_API_KEY: ${{ secrets.COINGECKO_PRO_API_KEY }}
        run: |
          K="$COINGECKO_DEMO_API_KEY"
          if [ -z "$K" ]; then K="$VITE_COINGECKO_DEMO_API_KEY"; fi
          if [ -z "$K" ] && [ -z "$COINGECKO_PRO_API_KEY" ]; then
            echo "::error::Définissez **COINGECKO_DEMO_API_KEY**, **VITE_COINGECKO_DEMO_API_KEY** ou **COINGECKO_PRO_API_KEY**."
            exit 1
          fi

      - name: Déployer Worker
        working-directory: workers/coingecko-cors-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 deploy

      - name: Secrets Worker (clés CoinGecko)
        working-directory: workers/coingecko-cors-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          VITE_COINGECKO_DEMO_API_KEY: ${{ secrets.VITE_COINGECKO_DEMO_API_KEY }}
          COINGECKO_PRO_API_KEY: ${{ secrets.COINGECKO_PRO_API_KEY }}
        run: |
          set -euo pipefail
          K="$COINGECKO_DEMO_API_KEY"
          if [ -z "$K" ]; then K="$VITE_COINGECKO_DEMO_API_KEY"; fi
          if [ -n "$K" ]; then
            printf '%s' "$K" | npx wrangler@3 secret put COINGECKO_DEMO_API_KEY
          fi
          if [ -n "${COINGECKO_PRO_API_KEY:-}" ]; then
            printf '%s' "$COINGECKO_PRO_API_KEY" | npx wrangler@3 secret put COINGECKO_PRO_API_KEY
          fi

      - name: Variable VITE_COINGECKO_API_ROOT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NAME=$(grep -E '^name[[:space:]]*=' workers/coingecko-cors-proxy/wrangler.toml | head -1 | sed -E 's/^name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          RESP=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          SUB=$(echo "$RESP" | jq -r '.result.subdomain // empty')
          WORKER_URL="https://${NAME}.${SUB}.workers.dev"
          echo "### Proxy CoinGecko" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL** : \`$WORKER_URL\`" >> "$GITHUB_STEP_SUMMARY"

          upsert_repo_var() {
            local var_name="$1" var_value="$2"
            local code body
            body=$(jq -n --arg n "$var_name" --arg v "$var_value" '{name:$n,value:$v}')
            code=$(curl -sS -o /tmp/gh_var_body.txt -w "%{http_code}" \
              -X PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables/${var_name}" \
              -d "$body") || true
            if [ "$code" = "204" ]; then echo "Variable mise à jour : $var_name"; return 0; fi
            if [ "$code" != "404" ]; then
              echo "::error::GitHub API variable **$var_name** : HTTP $code"; cat /tmp/gh_var_body.txt || true; exit 1
            fi
            code=$(curl -sS -o /tmp/gh_var_body.txt -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
              -d "$body") || true
            if [ "$code" = "201" ]; then echo "Variable créée : $var_name"; return 0; fi
            echo "::error::Création variable **$var_name** : HTTP $code"; cat /tmp/gh_var_body.txt || true; exit 1
          }

          upsert_repo_var VITE_COINGECKO_API_ROOT "$WORKER_URL"
          echo "- **VITE_COINGECKO_API_ROOT** enregistrée." >> "$GITHUB_STEP_SUMMARY"
