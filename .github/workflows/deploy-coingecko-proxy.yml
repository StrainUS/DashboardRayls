# Déploie workers/coingecko-cors-proxy et définit VITE_COINGECKO_API_ROOT.
#
# Secret CoinGecko : COINGECKO_DEMO_API_KEY ou (fallback) VITE_COINGECKO_DEMO_API_KEY
#
# Si l’étape variable échoue encore (403) : secret optionnel **ACTIONS_VARIABLES_TOKEN**
# = PAT « classic » scope **repo** ou PAT à granularité limitée avec *Variables* R/W sur ce dépôt.
name: Deploy CoinGecko CORS proxy

on:
  workflow_dispatch:

# Ne pas ajouter de bloc `permissions` ici : avec des droits explicites, la permission
# GitHub App « Variables » (API /actions/variables) reste à none → 403. Sans bloc,
# le GITHUB_TOKEN hérite du réglage dépôt : Settings → Actions → General →
# Workflow permissions → **Read and write**.

concurrency:
  group: deploy-coingecko-proxy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vérifier Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Secrets **CLOUDFLARE_API_TOKEN** et **CLOUDFLARE_ACCOUNT_ID** requis (voir proxy RPC)."
            exit 1
          fi

      - name: Vérifier sous-domaine workers.dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          OK=$(echo "$RESP" | jq -r '.success // false')
          SUB=$(echo "$RESP" | jq -r '.result.subdomain // empty')
          if [ "$OK" != "true" ] || [ -z "$SUB" ]; then
            echo "::error::Sous-domaine **workers.dev** non configuré sur le compte Cloudflare."
            exit 1
          fi
          echo "workers.dev OK : *.$SUB.workers.dev"

      - name: Vérifier une clé CoinGecko
        env:
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          VITE_COINGECKO_DEMO_API_KEY: ${{ secrets.VITE_COINGECKO_DEMO_API_KEY }}
          COINGECKO_PRO_API_KEY: ${{ secrets.COINGECKO_PRO_API_KEY }}
        run: |
          K="$COINGECKO_DEMO_API_KEY"
          if [ -z "$K" ]; then K="$VITE_COINGECKO_DEMO_API_KEY"; fi
          if [ -z "$K" ] && [ -z "$COINGECKO_PRO_API_KEY" ]; then
            echo "::error::Définissez **COINGECKO_DEMO_API_KEY**, **VITE_COINGECKO_DEMO_API_KEY** ou **COINGECKO_PRO_API_KEY**."
            exit 1
          fi

      - name: Déployer Worker
        working-directory: workers/coingecko-cors-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 deploy

      - name: Secrets Worker (clés CoinGecko)
        working-directory: workers/coingecko-cors-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
          VITE_COINGECKO_DEMO_API_KEY: ${{ secrets.VITE_COINGECKO_DEMO_API_KEY }}
          COINGECKO_PRO_API_KEY: ${{ secrets.COINGECKO_PRO_API_KEY }}
        run: |
          set -euo pipefail
          K="$COINGECKO_DEMO_API_KEY"
          if [ -z "$K" ]; then K="$VITE_COINGECKO_DEMO_API_KEY"; fi
          if [ -n "$K" ]; then
            printf '%s' "$K" | npx wrangler@3 secret put COINGECKO_DEMO_API_KEY
          fi
          if [ -n "${COINGECKO_PRO_API_KEY:-}" ]; then
            printf '%s' "$COINGECKO_PRO_API_KEY" | npx wrangler@3 secret put COINGECKO_PRO_API_KEY
          fi

      - name: Variable VITE_COINGECKO_API_ROOT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Si le GITHUB_TOKEN reçoit 403 (*Resource not accessible by integration*), ajoutez le secret
          # **ACTIONS_VARIABLES_TOKEN** (PAT classic **repo** ou PAT affiné avec *Variables* R/W sur ce dépôt),
          # ou définissez la variable à la main / en local : gh variable set VITE_COINGECKO_API_ROOT -b "URL" --repo …
          GH_TOKEN: ${{ secrets.ACTIONS_VARIABLES_TOKEN || github.token }}
        run: |
          set -euo pipefail
          NAME=$(grep -E '^name[[:space:]]*=' workers/coingecko-cors-proxy/wrangler.toml | head -1 | sed -E 's/^name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          RESP=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")
          SUB=$(echo "$RESP" | jq -r '.result.subdomain // empty')
          if [ -z "$SUB" ]; then
            echo "::error::API workers/subdomain : pas de sous-domaine."
            exit 1
          fi
          WORKER_URL="https://${NAME}.${SUB}.workers.dev"
          echo "### Proxy CoinGecko" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL** : \`$WORKER_URL\`" >> "$GITHUB_STEP_SUMMARY"

          if gh variable set VITE_COINGECKO_API_ROOT -b "$WORKER_URL" --repo "${{ github.repository }}" 2>/tmp/gh_var_err.txt; then
            echo "Variable enregistrée : VITE_COINGECKO_API_ROOT=$WORKER_URL"
            echo "- **VITE_COINGECKO_API_ROOT** enregistrée." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "::error::Échec \`gh variable set\` pour **VITE_COINGECKO_API_ROOT**."
          cat /tmp/gh_var_err.txt || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Si 403 : PAT ou commande locale" >> "$GITHUB_STEP_SUMMARY"
          echo "Secret **ACTIONS_VARIABLES_TOKEN** (PAT **repo**), ou depuis votre machine connectée à GitHub :" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "    gh variable set VITE_COINGECKO_API_ROOT -b \"$WORKER_URL\" --repo ${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Après création de la variable, relancez le workflow **Pages**."
          exit 1
