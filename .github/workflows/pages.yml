# Déploiement GitHub Pages (Vite + React Router : base = /{repo}/)
name: Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Deploy RPC CORS proxy"
      - "Deploy CoinGecko CORS proxy"
    types:
      - completed
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, tests, flux et audit
        run: npm run lint && npm run test && npm run verify:feed && npm audit --audit-level=moderate

      - name: Exiger VITE_RAYLS_RPC_HTTP_URL (évite un site public cassé par CORS)
        env:
          PROXY_URL: ${{ vars.VITE_RAYLS_RPC_HTTP_URL }}
          ALLOW_SKIP: ${{ vars.PAGES_ALLOW_MISSING_RPC_PROXY }}
        run: |
          if [ "$ALLOW_SKIP" = "true" ]; then
            echo "PAGES_ALLOW_MISSING_RPC_PROXY=true — build sans proxy (CORS possible sur github.io)."
            exit 0
          fi
          if [ -z "$PROXY_URL" ]; then
            echo "::error::Variable de dépôt **VITE_RAYLS_RPC_HTTP_URL** vide. Sans elle, l’onglet Réseau échoue sur *.github.io (CORS)."
            echo "::error::1) Actions → **Deploy RPC CORS proxy** → Run workflow  2) Ce workflow se relancera tout seul, ou relancez **Pages** manuellement."
            echo "::error::Doc : https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/.github/DEPLOY_PAGES.md"
            exit 1
          fi

      - name: Build pour GitHub Pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_RAYLS_RPC_HTTP_URL: ${{ vars.VITE_RAYLS_RPC_HTTP_URL }}
          # WebSocket direct vers mainnet-rpc depuis *.github.io peut échouer ; le batch HTTP suffit.
          VITE_RPC_WS_URL: '0'
          # Spot / marché : sans clé ni proxy, l’API publique CoinGecko échoue souvent depuis le navigateur (CORS / OPTIONS).
          # Secret dépôt (optionnel) : même clé demo que en local — voir .github/DEPLOY_PAGES.md
          VITE_COINGECKO_DEMO_API_KEY: ${{ secrets.VITE_COINGECKO_DEMO_API_KEY }}
          # Alternative : URL d’un proxy /api/v3 (variable dépôt non secrète si vous préférez ne pas embarquer la clé)
          VITE_COINGECKO_API_ROOT: ${{ vars.VITE_COINGECKO_API_ROOT }}
        run: npm run build

      - name: SPA fallback (404)
        run: cp dist/index.html dist/404.html

      - name: URL publique attendue (projet)
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "Ouvrir après déploiement réussi : https://${OWNER_LC}.github.io/${{ github.event.repository.name }}/"
          echo "(La racine https://${OWNER_LC}.github.io/ peut rester en 404 sans site user/org — c'est normal.)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
