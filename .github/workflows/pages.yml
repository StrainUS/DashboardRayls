# Déploiement GitHub Pages (Vite + React Router : base = /{repo}/)
name: Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, tests, flux et audit
        run: npm run lint && npm run test && npm run verify:feed && npm audit --audit-level=moderate

      - name: Build pour GitHub Pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA fallback (404)
        run: cp dist/index.html dist/404.html

      - name: URL publique attendue (projet)
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "Ouvrir après déploiement réussi : https://${OWNER_LC}.github.io/${{ github.event.repository.name }}/"
          echo "(La racine https://${OWNER_LC}.github.io/ peut rester en 404 sans site user/org — c'est normal.)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
